*{box-sizing:border-box;margin:0;padding:0}

.app{max-width:480px;margin:0 auto;min-height:100vh;padding:16px 14px 96px}
h2{font-size:28px;line-height:1.25;font-weight:800}
h3{font-size:20px;font-weight:800}
h4{font-size:17px;font-weight:700}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow)}

.btn:active{transform:translateY(1px)}
.btn-ghost{background:#f4f1e9;color:var(--ink)}
.hidden{display:none!important}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.shop{display:flex;gap:12px;align-items:center;padding:12px;border-radius:14px;background:var(--card);border:1px solid var(--line);cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
.shop:hover{transform:translateY(-1px)}
.badge{font-size:11px;background:#f4f1e9;padding:4px 9px;border-radius:999px;color:#3a352a}

.product-name{font-weight:700;font-size:14px}

  if(!navigator.geolocation){ alert('लोकेशन सपोर्ट नहीं'); return; }
  b.textContent='⏳...'; b.disabled=true;
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude.toFixed(6), lng=pos.coords.longitude.toFixed(6);
    $('cx-landmark').value = '📍 '+lat+', '+lng;
    b.textContent='✅'; setTimeout(()=>{b.textContent='📍 लोकेशन'; b.disabled=false},1200);
  }, err=>{ alert('लोकेशन नहीं मिली: '+err.message); b.textContent='📍 लोकेशन'; b.disabled=false; }, {enableHighAccuracy:true, timeout:10000});
};

function applyCatFilter(){
  document.querySelectorAll('.cat-chip').forEach(btn=>{
    btn.onclick = ()=>{
      document.querySelectorAll('.cat-chip').forEach(b=>{b.style.background='#f4f1e9';b.style.color='#19160f'});
      btn.style.background='#0b7a1b';btn.style.color='#fff';
      const cat = btn.dataset.cat;
      document.querySelectorAll('#seller-list.shop').forEach((el,i)=>{
        const s = SELLERS[i];
        el.style.display = (cat==='all' || (s.cat||'').includes(cat))? '' : 'none';
      });
    };
  });
}
setTimeout(applyCatFilter, 300);

function bindAuth(){
  const send=$('btn-send-otp'), verify=$('btn-verify-otp'), back=$('btn-back-phone'), guest=$('btn-guest');
  if(send) send.onclick=()=>{
    const p=$('auth-phone').value.trim();
    if(p.length<10){ alert('सही नंबर डालें'); return; }
    $('auth-phone-label').textContent='+91 '+p;
    $('auth-step-phone').classList.add('hidden');
    $('auth-step-otp').classList.remove('hidden');
    $('auth-otp').focus();
  };
  if(verify) verify.onclick=()=>{
    const otp=$('auth-otp').value.trim();
    const phone=$('auth-phone').value.trim()||'9000000000';
    if(otp==='1234' || phone==='9000000000') showApp(phone); else alert('गलत OTP • डेमो: 1234');
  };
  if(back) back.onclick=()=>{ $('auth-step-otp').classList.add('hidden'); $('auth-step-phone').classList.remove('hidden'); };
  if(guest) guest.onclick=()=>showApp(null);
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', bindAuth); else bindAuth();
setTimeout(bindAuth, 500); setTimeout(bindAuth, 1500);
setTimeout(()=>{ const g=$('btn-guest'); if(g &&!$('view-app').classList.contains('hidden')===false){ g.style.outline='3px solid #0b7a1b'; g.textContent='👉 बिना लॉगिन जारी रखें – Tap'; } }, 3000);

$('btn-back-sellers').onclick=()=>{ $('product-area').classList.add('hidden'); };

async function loadSellersFromSB(){
  try{
    const local = JSON.parse(localStorage.getItem('balcony_sellers')||'[]');
    if(local.length){ SELLERS = local.map((s,i)=>({id:s.id||('s'+i), name:s.shopName||s.name||'Shop', cat:s.category||'किराना', upi:s.upi||'balcony@upi'})); renderSellers(); }
    if(supabaseReady && supabase){
      const {data} = await supabase.from('sellers').select('id,phone,shop_name,upi,category').limit(20);
      if(data && data.length){ SELLERS = data.map((r,i)=>({id:r.id||r.phone||('s'+i), name:r.shop_name||'Shop', cat:r.category||'किराना', upi:r.upi||'balcony@upi'})); renderSellers(); }
    }
  }catch(e){}
}
loadSellersFromSB();
</script>
